<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Restringido · SOC-CSIRT CEDIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background-color: #0E2A5C; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
    .login-container { background: white; padding: 40px; border-radius: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.2 ); width: 100%; max-width: 400px; color: #0B1733; text-align: center; }
    h2 { margin-bottom: 10px; font-size: 20px; }
    p { color: #64748B; font-size: 14px; margin-bottom: 30px; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #E2E8F0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background-color: #F25C2A; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; transition: background 0.2s; }
    button:hover { background-color: #D14D22; }
    #error-msg { color: #E5392F; font-size: 13px; margin-top: 10px; display: none; }
    #main-content { display: none; }
</style>
</head>
<body>
<div id="login-screen" class="login-container">
    <div style="background: #F25C2A; width: 50px; height: 50px; border-radius: 10px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <h2>Acceso Restringido</h2>
    <p>Introduce tus credenciales para acceder a la Calculadora ROI de SOC-CSIRT CEDIA.</p>
    <input type="text" id="username" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="checkAuth()">Entrar</button>
    <div id="error-msg">Credenciales incorrectas. Inténtalo de nuevo.</div>
</div>
<div id="main-content"></div>
<script>
    const USER = "cediaroiSI";
    const PASS = "cediaroi.SI@2026";
    function checkAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (u === USER && p === PASS) {
            sessionStorage.setItem('auth_cedia', 'true');
            showCalculator();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }
    function showCalculator() {
        document.getElementById('login-screen').style.display = 'none';
        document.body.style.display = 'block';
        document.body.style.height = 'auto';
        fetch('cedia_roi_calculator.html')
            .then(r => r.text())
            .then(data => {
                document.getElementById('main-content').innerHTML = data;
                const scripts = document.getElementById('main-content').getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) { eval(scripts[i].innerText); }
            });
    }
    if (sessionStorage.getItem('auth_cedia') === 'true') { showCalculator(); }
</script>
</body>
</html>
