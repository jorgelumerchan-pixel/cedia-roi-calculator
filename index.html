<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Restringido · SOC-CSIRT CEDIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    #login-screen {
        font-family: 'Inter', sans-serif;
        background-color: #0E2A5C;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: white;
    }
    .login-container {
        background: white;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2 );
        width: 100%;
        max-width: 400px;
        color: #0B1733;
        text-align: center;
    }
    h2 { margin-bottom: 10px; font-size: 20px; }
    p.login-p { color: #64748B; font-size: 14px; margin-bottom: 30px; }
    input.login-input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #E2E8F0;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 16px;
    }
    button.login-btn {
        width: 100%;
        padding: 12px;
        background-color: #F25C2A;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.2s;
    }
    button.login-btn:hover { background-color: #D14D22; }
    #error-msg { color: #E5392F; font-size: 13px; margin-top: 10px; display: none; }
    #main-content { display: none; }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-container">
        <div style="background: #F25C2A; width: 50px; height: 50px; border-radius: 10px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h2>Acceso Restringido</h2>
        <p class="login-p">Introduce tus credenciales para acceder a la Calculadora ROI de SOC-CSIRT CEDIA.</p>
        <input type="text" id="username" class="login-input" placeholder="Usuario">
        <input type="password" id="password" class="login-input" placeholder="Contraseña">
        <button class="login-btn" onclick="checkAuth()">Entrar</button>
        <div id="error-msg">Credenciales incorrectas. Inténtalo de nuevo.</div>
    </div>
</div>

<div id="main-content"></div>

<script>
    const USER = "cediaroiSI";
    const PASS = "cediaroi.SI@2026";

    function checkAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const error = document.getElementById('error-msg');

        if (u === USER && p === PASS) {
            sessionStorage.setItem('auth_cedia', 'true');
            window.history.pushState({authenticated: true}, 'Calculadora ROI', 'cedia_roi_calculator.html');
            showCalculator();
        } else {
            error.style.display = 'block';
        }
    }

    function showCalculator() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        
        fetch('cedia_roi_calculator.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error('No se pudo cargar el archivo: ' + response.statusText);
                }
                return response.text();
            })
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                
                const styles = doc.querySelectorAll('style');
                styles.forEach(s => document.head.appendChild(s.cloneNode(true)));
                
                const links = doc.querySelectorAll('link');
                links.forEach(l => {
                    if (!document.head.querySelector(`link[href="${l.href}"]`)) {
                        document.head.appendChild(l.cloneNode(true));
                    }
                });
                
                document.getElementById('main-content').innerHTML = doc.body.innerHTML;
                document.title = doc.title;
                
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(s => {
                    const newScript = document.createElement('script');
                    if (s.src) {
                        newScript.src = s.src;
                    } else {
                        newScript.textContent = s.textContent;
                    }
                    document.body.appendChild(newScript);
                });
            })
            .catch(error => {
                console.error('Error cargando la calculadora:', error);
                document.getElementById('main-content').innerHTML = '<div style="padding: 40px; text-align: center; color: red;"><h2>Error</h2><p>No se pudo cargar la calculadora. Por favor, verifica que el archivo "cedia_roi_calculator.html" exista en el mismo directorio.</p></div>';
            });
    }

    if (sessionStorage.getItem('auth_cedia') === 'true') {
        showCalculator();
    }
</script>
</body>
</html>
